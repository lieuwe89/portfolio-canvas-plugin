name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via lftp
        run: |
          lftp -c "
            set sftp:connect-program 'ssh -i $HOME/.ssh/deploy_key -o UserKnownHostsFile=$HOME/.ssh/known_hosts';
            open sftp://${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }};
            mirror --reverse --delete --verbose \
              --exclude '\.git/' \
              --exclude '\.github/' \
              --exclude '\.gitignore' \
              --exclude 'node_modules/' \
              --exclude 'tests/' \
              --exclude 'test/' \
              --exclude '\.env' \
              --exclude '.*\.log' \
              --exclude '\.DS_Store' \
              --exclude 'Thumbs\.db' \
              --exclude '\.editorconfig' \
              --exclude 'phpcs\.xml' \
              --exclude 'phpunit\.xml' \
              --exclude 'composer\.json' \
              --exclude 'composer\.lock' \
              --exclude 'package\.json' \
              --exclude 'package-lock\.json' \
              --exclude 'webpack\.config\.' \
              --exclude 'README\.md' \
              --exclude 'CHANGELOG\.md' \
              ./ ${{ secrets.DEPLOY_PATH }}/
          "

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
