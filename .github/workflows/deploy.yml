name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via tar pipe (atomic swap)
        run: |
          tar czf - \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.rsyncignore' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='test' \
            --exclude='.env' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            --exclude='.editorconfig' \
            --exclude='phpcs.xml*' \
            --exclude='phpunit.xml*' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='webpack.config.*' \
            --exclude='README.md' \
            --exclude='CHANGELOG.md' \
            . | ssh -i ~/.ssh/deploy_key \
                -o StrictHostKeyChecking=no \
                ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
                "set -e
                 DEPLOY=${{ secrets.DEPLOY_PATH }}
                 TMP=\${DEPLOY}.deploying
                 rm -rf \$TMP
                 mkdir -p \$TMP
                 tar xzf - -C \$TMP
                 rm -rf \${DEPLOY}.old
                 mv \$DEPLOY \${DEPLOY}.old
                 mv \$TMP \$DEPLOY
                 rm -rf \${DEPLOY}.old"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
